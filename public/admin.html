<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Ventas Misionero</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --gold:#c9973a; --gold-light:#e8b84b; --cream:#fdf6e3; --dark:#1a1208; --dark-mid:#2d2010; --brown:#6b4c1e; --accent:#d4520a; --surface:#fff9ee; --border:#e8d5aa; --shadow:rgba(26,18,8,0.15); --green:#2d8a4e; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--dark); color:var(--cream); min-height:100vh; display:flex; flex-direction:column; }
  .login-screen { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; }
  .login-box { background:var(--surface); color:var(--dark); border:2px solid var(--gold); border-radius:20px; padding:48px 40px; width:100%; max-width:380px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  .login-box h1 { font-family:'Playfair Display',serif; font-size:1.6rem; color:var(--brown); margin-bottom:8px; }
  .login-box p { font-size:0.85rem; color:#999; margin-bottom:28px; }
  .login-box input { width:100%; padding:12px 16px; border:1.5px solid var(--border); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:1rem; color:var(--dark); outline:none; margin-bottom:16px; }
  .login-box input:focus { border-color:var(--gold); }
  .btn-login { width:100%; padding:13px; background:var(--dark); color:var(--gold-light); border:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; }
  .btn-login:hover { background:var(--dark-mid); }
  .error-msg { color:var(--accent); font-size:0.85rem; margin-top:10px; }
  .admin-screen { display:none; flex-direction:column; min-height:100vh; background:var(--cream); color:var(--dark); }
  .admin-screen.show { display:flex; }
  .admin-header { background:var(--dark); padding:20px 32px; display:flex; align-items:center; justify-content:space-between; border-bottom:3px solid var(--gold); flex-wrap:wrap; gap:12px; }
  .admin-header h1 { font-family:'Playfair Display',serif; font-size:1.4rem; color:var(--gold-light); }
  .admin-header span { font-size:0.8rem; color:rgba(253,246,227,0.5); }
  .header-btns { display:flex; gap:10px; flex-wrap:wrap; }
  .btn-export { background:linear-gradient(135deg,var(--green) 0%,#1f6337 100%); color:#fff; border:none; padding:12px 28px; border-radius:50px; font-family:'DM Sans',sans-serif; font-size:0.92rem; font-weight:700; cursor:pointer; box-shadow:0 4px 16px rgba(45,138,78,0.4); transition:transform 0.15s; display:inline-flex; align-items:center; gap:8px; }
  .btn-export:hover { transform:translateY(-2px); }
  .btn-refresh { background:transparent; color:var(--gold-light); border:1.5px solid var(--gold); padding:12px 20px; border-radius:50px; font-family:'DM Sans',sans-serif; font-size:0.92rem; font-weight:700; cursor:pointer; transition:background 0.15s; display:inline-flex; align-items:center; gap:8px; }
  .btn-refresh:hover { background:rgba(201,151,58,0.15); }
  .admin-body { padding:28px 24px; max-width:1200px; margin:0 auto; width:100%; }
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:16px; margin-bottom:32px; }
  .stat-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center; box-shadow:0 2px 12px var(--shadow); }
  .stat-card .num { font-family:'Playfair Display',serif; font-size:2rem; font-weight:900; color:var(--accent); }
  .stat-card .label { font-size:0.78rem; color:#999; text-transform:uppercase; letter-spacing:0.06em; margin-top:4px; }
  .section-title { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--brown); margin-bottom:16px; padding-bottom:8px; border-bottom:2px solid var(--border); }
  .table-wrap { overflow-x:auto; margin-bottom:32px; }
  table { width:100%; border-collapse:collapse; font-size:0.85rem; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 2px 12px var(--shadow); }
  th { background:var(--dark); color:var(--gold-light); padding:11px 14px; text-align:left; font-family:'Playfair Display',serif; font-size:0.78rem; letter-spacing:0.05em; white-space:nowrap; }
  td { padding:8px 14px; border-bottom:1px solid var(--border); color:var(--dark); white-space:nowrap; vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:nth-child(even) td { background:rgba(201,151,58,0.04); }
  td.num { text-align:right; font-weight:600; }
  td.zero { color:#ccc; text-align:right; }
  .total-row td { background:rgba(201,151,58,0.12)!important; font-weight:700; color:var(--brown); }
  .empty { text-align:center; padding:40px; color:#bbb; font-style:italic; }
  .vendedor-badge { display:inline-block; background:var(--dark); color:var(--gold); padding:2px 8px; border-radius:20px; font-size:0.75rem; font-weight:600; }
  .fecha { color:#bbb; font-size:0.78rem; }

  /* Edición inline */
  .td-editable { position:relative; }
  .td-editable input[type="number"] { width:56px; padding:3px 6px; border:1.5px solid var(--gold); border-radius:6px; font-family:'DM Sans',sans-serif; font-size:0.85rem; font-weight:600; text-align:center; color:var(--dark); outline:none; background:#fffbe8; }
  .td-editable input[type="text"] { width:120px; padding:3px 6px; border:1.5px solid var(--gold); border-radius:6px; font-family:'DM Sans',sans-serif; font-size:0.85rem; color:var(--dark); outline:none; background:#fffbe8; }
  .btn-edit { background:transparent; border:1px solid var(--gold); color:var(--brown); border-radius:6px; padding:3px 9px; font-size:0.75rem; font-weight:600; cursor:pointer; transition:background 0.15s; white-space:nowrap; }
  .btn-edit:hover { background:rgba(201,151,58,0.15); }
  .btn-save { background:var(--green); border:none; color:#fff; border-radius:6px; padding:3px 9px; font-size:0.75rem; font-weight:600; cursor:pointer; white-space:nowrap; }
  .btn-save:hover { background:#1f6337; }
  .btn-cancel { background:transparent; border:1px solid #ccc; color:#888; border-radius:6px; padding:3px 9px; font-size:0.75rem; cursor:pointer; white-space:nowrap; }
  .btn-cancel:hover { background:#f5f5f5; }
  .btn-del { background:transparent; border:1px solid rgba(212,82,10,0.4); color:var(--accent); border-radius:6px; padding:3px 9px; font-size:0.75rem; cursor:pointer; }
  .btn-del:hover { background:rgba(212,82,10,0.1); }
  .acciones-col { display:flex; gap:5px; align-items:center; }

  /* Toast */
  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--dark); color:var(--gold-light); padding:12px 26px; border-radius:50px; font-size:0.88rem; font-weight:600; border:1px solid var(--gold); opacity:0; transition:transform 0.35s cubic-bezier(.34,1.56,.64,1),opacity 0.35s; z-index:999; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  .toast.error { border-color:var(--accent); color:#ff8a60; }
  .toast.ok { border-color:var(--green); color:#6fcf97; }
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-box">
    <h1>🔐 Panel Admin</h1>
    <p>Ingresá la contraseña para ver las ventas</p>
    <input type="password" id="password-input" placeholder="Contraseña" onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">Ingresar</button>
    <div class="error-msg" id="error-msg"></div>
  </div>
</div>

<div class="admin-screen" id="admin-screen">
  <div class="admin-header">
    <div>
      <h1>📊 Panel de Ventas</h1>
      <span>Grupo Misionero San Francisco Solano</span>
    </div>
    <div class="header-btns">
      <button class="btn-refresh" onclick="recargarDatos()">↻ Actualizar</button>
      <button class="btn-export" onclick="exportarExcel()">⬇ Exportar Excel</button>
    </div>
  </div>
  <div class="admin-body">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="section-title">Detalle por vendedor <span style="font-size:0.8rem;font-weight:400;color:#aaa;font-family:'DM Sans',sans-serif">— Hacé clic en ✏️ para editar una fila</span></div>
    <div class="table-wrap"><div id="tabla-detalle"></div></div>
    <div class="section-title">Totales por producto</div>
    <div class="table-wrap"><div id="tabla-totales"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PRODUCTOS = ['Combo 1','Combo 2','Combo 3','Muzzarella','Especial','Napolitana','Calabresa','Fugazzeta'];
let password = '';
let datosVentas = [];
let filaEditando = null; // { vendedorNombre, compradorIdx }

async function login() {
  password = document.getElementById('password-input').value;
  const res = await fetch(`/api/admin/ventas?password=${encodeURIComponent(password)}`);
  if(res.status===401) { document.getElementById('error-msg').textContent='Contraseña incorrecta'; return; }
  datosVentas = await res.json();
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-screen').classList.add('show');
  renderAdmin();
}

async function recargarDatos() {
  const res = await fetch(`/api/admin/ventas?password=${encodeURIComponent(password)}`);
  datosVentas = await res.json();
  filaEditando = null;
  renderAdmin();
  showToast('✓ Datos actualizados','ok');
}

function renderAdmin() {
  const totalVendedores = datosVentas.length;
  const totalCompradores = datosVentas.reduce((s,v)=>s+v.compradores.filter(c=>PRODUCTOS.some(p=>c.cantidades[p]>0)).length,0);
  const totalItems = PRODUCTOS.reduce((s,p)=>s+datosVentas.reduce((s2,v)=>s2+v.compradores.reduce((s3,c)=>s3+(c.cantidades[p]||0),0),0),0);

  document.getElementById('stats-grid').innerHTML=`
    <div class="stat-card"><div class="num">${totalVendedores}</div><div class="label">Vendedores</div></div>
    <div class="stat-card"><div class="num">${totalCompradores}</div><div class="label">Compradores</div></div>
    <div class="stat-card"><div class="num">${totalItems}</div><div class="label">Unidades totales</div></div>
  `;

  if(datosVentas.length===0) {
    document.getElementById('tabla-detalle').innerHTML='<div class="empty">Aún no hay ventas registradas.</div>';
    document.getElementById('tabla-totales').innerHTML='';
    return;
  }

  // Tabla detalle con edición
  let html=`<table><thead><tr><th>Vendedor</th><th>Comprador</th>${PRODUCTOS.map(p=>`<th>${p}</th>`).join('')}<th>Acciones</th></tr></thead><tbody>`;

  datosVentas.forEach((v, vi) => {
    v.compradores.forEach((c, ci) => {
      if(!PRODUCTOS.some(p=>c.cantidades[p]>0)) return;
      const esEditando = filaEditando && filaEditando.vi===vi && filaEditando.ci===ci;

      if(esEditando) {
        html+=`<tr style="background:#fffbe8;">
          <td><span class="vendedor-badge">${v.vendedor}</span></td>
          <td class="td-editable"><input type="text" id="edit-nombre" value="${c.nombre||''}" style="width:140px"></td>
          ${PRODUCTOS.map(p=>`<td class="td-editable"><input type="number" id="edit-${p.replace(/\s/g,'_')}" value="${c.cantidades[p]||0}" min="0"></td>`).join('')}
          <td><div class="acciones-col">
            <button class="btn-save" onclick="guardarFila(${vi},${ci})">✓ Guardar</button>
            <button class="btn-cancel" onclick="cancelarEdicion()">✕</button>
          </div></td>
        </tr>`;
      } else {
        html+=`<tr>
          <td><span class="vendedor-badge">${v.vendedor}</span></td>
          <td>${c.nombre||'<em style="color:#bbb">Sin nombre</em>'}</td>
          ${PRODUCTOS.map(p=>`<td class="${(c.cantidades[p]||0)>0?'num':'zero'}">${(c.cantidades[p]||0)>0?c.cantidades[p]:'—'}</td>`).join('')}
          <td><div class="acciones-col">
            <button class="btn-edit" onclick="editarFila(${vi},${ci})">✏️ Editar</button>
            <button class="btn-del" onclick="eliminarFila(${vi},${ci})">🗑</button>
          </div></td>
        </tr>`;
      }
    });
  });

  const totales=PRODUCTOS.map(p=>datosVentas.reduce((s,v)=>s+v.compradores.reduce((s2,c)=>s2+(c.cantidades[p]||0),0),0));
  html+=`<tr class="total-row"><td colspan="2">TOTAL GENERAL</td>${totales.map(t=>`<td class="num">${t||'—'}</td>`).join('')}<td></td></tr>`;
  html+=`</tbody></table>`;
  document.getElementById('tabla-detalle').innerHTML=html;

  // Tabla totales por producto
  let html2=`<table><thead><tr><th>Producto</th>${datosVentas.map(v=>`<th>${v.vendedor}</th>`).join('')}<th>TOTAL</th></tr></thead><tbody>`;
  PRODUCTOS.forEach(p=>{
    const porVendedor=datosVentas.map(v=>v.compradores.reduce((s,c)=>s+(c.cantidades[p]||0),0));
    const total=porVendedor.reduce((a,b)=>a+b,0);
    html2+=`<tr><td style="font-weight:600">${p}</td>${porVendedor.map(n=>`<td class="${n>0?'num':'zero'}">${n>0?n:'—'}</td>`).join('')}<td class="num" style="color:var(--accent);font-weight:700">${total||'—'}</td></tr>`;
  });
  html2+=`</tbody></table>`;
  document.getElementById('tabla-totales').innerHTML=html2;
}

function editarFila(vi, ci) {
  filaEditando = { vi, ci };
  renderAdmin();
  // Foco en el campo nombre
  setTimeout(()=>{ const el=document.getElementById('edit-nombre'); if(el) el.focus(); },50);
}

function cancelarEdicion() {
  filaEditando = null;
  renderAdmin();
}

async function guardarFila(vi, ci) {
  const nombreNuevo = document.getElementById('edit-nombre').value.trim();
  const cantidadesNuevas = {};
  PRODUCTOS.forEach(p => {
    const val = parseInt(document.getElementById(`edit-${p.replace(/\s/g,'_')}`).value) || 0;
    cantidadesNuevas[p] = val;
  });

  // Actualizar localmente
  datosVentas[vi].compradores[ci].nombre = nombreNuevo;
  datosVentas[vi].compradores[ci].cantidades = cantidadesNuevas;

  // Enviar al servidor
  const v = datosVentas[vi];
  const res = await fetch('/api/ventas', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ vendedor: v.vendedor, compradores: v.compradores })
  });

  filaEditando = null;
  if(res.ok) {
    showToast('✓ Cambios guardados','ok');
  } else {
    showToast('❌ Error al guardar','error');
  }
  renderAdmin();
}

async function eliminarFila(vi, ci) {
  if(!confirm(`¿Eliminar este comprador? Esta acción no se puede deshacer.`)) return;

  datosVentas[vi].compradores.splice(ci, 1);

  const v = datosVentas[vi];
  const res = await fetch('/api/ventas', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ vendedor: v.vendedor, compradores: v.compradores })
  });

  if(res.ok) {
    showToast('✓ Comprador eliminado','ok');
  } else {
    showToast('❌ Error al eliminar','error');
  }
  renderAdmin();
}

function exportarExcel() {
  window.location.href=`/api/admin/exportar?password=${encodeURIComponent(password)}`;
}

function showToast(msg, tipo='') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(tipo?' '+tipo:'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
